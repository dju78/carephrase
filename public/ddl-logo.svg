<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="DDL logo">
  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#082554" flood-opacity="0.14"/>
    </filter>
  </defs>

  <!-- transparent background -->

  <!-- Outer professional D -->
  <path d="M138 70 H286 C388 70 456 148 456 256 C456 364 388 442 286 442 H138 V378 H282 C348 378 392 328 392 256 C392 184 348 134 282 134 H138 Z"
        fill="#082554" filter="url(#softShadow)"/>

  <!-- Inner white space to sharpen D -->
  <path d="M206 150 H278 C334 150 374 192 374 256 C374 320 334 362 278 362 H206 Z"
        fill="white"/>

  <!-- DL connector inside the big D:
       top adjusted into a rounded D-like curve; lower part kept angular enough to suggest L/data pathway -->
  <path d="M116 112
           C170 112 204 146 204 190
           C204 216 190 238 166 252
           L206 296
           L150 376"
        fill="none"
        stroke="#082554"
        stroke-width="26"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- White highlight gap to give the inner mark a refined layered look -->
  <path d="M116 112
           C170 112 204 146 204 190
           C204 216 190 238 166 252
           L206 296
           L150 376"
        fill="none"
        stroke="white"
        stroke-width="10"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- Nodes -->
  <circle cx="108" cy="112" r="30" fill="#16864C" stroke="white" stroke-width="8"/>
  <circle cx="166" cy="252" r="30" fill="#C49A2C" stroke="white" stroke-width="8"/>
  <circle cx="150" cy="376" r="30" fill="#082554" stroke="white" stroke-width="8"/>

  <!-- Analytics bars -->
  <rect x="250" y="286" width="28" height="76" rx="6" fill="#16864C"/>
  <rect x="294" y="236" width="28" height="126" rx="6" fill="#16864C"/>
  <rect x="338" y="180" width="28" height="182" rx="6" fill="#16864C"/>
</svg>